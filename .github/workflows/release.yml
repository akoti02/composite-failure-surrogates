name: Release

# Triggered by pushing a tag that starts with "v" (e.g. v0.3.5).
# Builds signed Windows + macOS (Apple Silicon) bundles on matching GitHub
# Actions runners, publishes both to a single GitHub Release, and
# updates latest.json so installed copies auto-offer the update.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — contents of ~/.tauri/rp3.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — empty string (our key has no pw)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Let the Windows build finish even if the Mac build fails; we'd
      # rather have "Windows works, Mac broken" than "neither".
      fail-fast: false
      matrix:
        include:
          # macOS: Apple Silicon (aarch64). GH macos-latest runner is
          # arm64 by default as of macos-14+, so this compiles natively.
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - platform: windows-latest
            rust-target: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 LTS — newer versions (21+) aren't always supported by
      # Tauri 2's CLI or some Vite plugins we use.
      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: app/sidecar/requirements.txt

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Install sidecar Python deps
        working-directory: app/sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build sidecar with PyInstaller
        working-directory: app/sidecar
        run: pyinstaller --clean rp3-sidecar.spec

      - name: Build Tauri bundle + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'RP3 ${{ github.ref_name }}'
          releaseBody: |
            ## RP3 ${{ github.ref_name }}

            Installed copies auto-update on launch.

            **Windows (x64)** — download `RP3_*_x64-setup.exe` and run.
            **macOS (Apple Silicon)** — download `RP3_*_aarch64.dmg`, open, drag to Applications. First launch: Ctrl-click the app in the Applications folder → **Open** (the build isn't Apple-notarized, so Gatekeeper warns the first time; every launch after is normal).

            Auto-update applies to both platforms from this release forward.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.tauri-args }}
